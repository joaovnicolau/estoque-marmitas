<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planejamento de Compras</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.10);
  --border-strong: rgba(0,0,0,0.18);
  --text: #1a1a18;
  --text-muted: #6b6b67;
  --text-light: #9b9b97;
  --green-bg: #eaf3de;
  --green-text: #3b6d11;
  --green-vivid: #34A853;
  --amber-bg: #faeeda;
  --amber-text: #854f0b;
  --gray-bg: #f1efe8;
  --gray-text: #5f5e5a;
  --radius: 10px;
  --radius-sm: 6px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 980px; margin: 0 auto; padding: 24px 16px 40px; }

/* HEADER */
.page-header { margin-bottom: 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.page-header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.page-subtitle { font-size: 12px; color: var(--text-muted); }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; margin-top: 4px; }
.header-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  border: 0.5px solid var(--border-strong); background: var(--surface);
  cursor: pointer; font-size: 15px; transition: background 0.1s; color: var(--text-muted);
}
.icon-btn:hover { background: var(--gray-bg); }
.btn-resumo {
  display: inline-flex; align-items: center; gap: 8px;
  height: 30px; padding: 0 14px;
  font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  background: var(--text); color: #fff; border: none;
  border-radius: var(--radius-sm); cursor: pointer; transition: background 0.12s;
}
.btn-resumo:hover { background: #333; }
.week-label { font-size: 10px; color: var(--text-light); }
.status-dot { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-text); flex-shrink: 0; }
.dot.online { background: #3b6d11; }
.dot.syncing { background: #854f0b; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.25rem; }
.stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.stat-card .num { font-size: 26px; font-weight: 600; line-height: 1; margin-bottom: 4px; }
.stat-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }

/* CATEGORY */
.category-block { margin-bottom: 1rem; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.category-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--bg);
  border-bottom: 0.5px solid var(--border);
  cursor: pointer; user-select: none; transition: background 0.1s;
}
.category-header:hover { background: #ece9e0; }
.category-name { font-size: 13px; font-weight: 600; flex: 1; }
.category-count { font-size: 11px; color: var(--text-muted); }
.cat-badge {
  font-size: 11px; font-weight: 500;
  background: var(--green-bg); color: var(--green-text);
  border-radius: 20px; padding: 2px 9px; display: none;
}
.cat-badge.visible { display: inline-block; }
.chevron { font-size: 11px; color: var(--text-light); transition: transform 0.2s; display: inline-block; }
.chevron.open { transform: rotate(180deg); }

/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  padding: 8px 10px; font-size: 10px; font-weight: 500;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.04em; background: #fafaf8;
  border-bottom: 0.5px solid var(--border); text-align: left; white-space: nowrap;
}
tbody tr.main-row { border-bottom: 0.5px solid var(--border); }
tbody tr.main-row:last-of-type { border-bottom: none; }
tbody tr.main-row:hover td { background: #fafaf8; }
tbody td { padding: 0; vertical-align: middle; }

td.td-name { padding: 10px 12px; border-right: 0.5px solid var(--border); cursor: pointer; }
td.td-name:hover .item-name { color: #3b6d11; }
.item-name { font-size: 13px; font-weight: 500; color: var(--text); }
.item-supplier { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.item-chip {
  display: none; margin-top: 4px;
  font-size: 11px; font-weight: 500;
  background: var(--green-bg); color: var(--green-text);
  border-radius: 20px; padding: 1px 8px;
}
td.td-qty { width: 150px; padding: 8px 10px; vertical-align: top; padding-top: 12px; }
.item-days-wrap { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; align-items: center; }
.day-qty-wrap { display: inline-flex; align-items: center; gap: 3px; margin-right: 6px; }
.day-qty-input {
  width: 52px; height: 26px; padding: 0 5px;
  font-size: 12px; font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); outline: none;
}
.day-qty-input:focus { border-color: var(--text); }
.day-qty-unit {
  height: 26px; padding: 0 4px; font-size: 11px; font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); outline: none; cursor: pointer;
}
.summ-cat-group { margin-bottom: 8px; }
.summ-cat-group-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px; padding: 0 2px;
}
.summ-cat-group-name { font-size: 12px; font-weight: 600; color: var(--text-muted); }

.qty-wrap { display: flex; align-items: center; gap: 5px; }
input[type="number"] {
  width: 70px; height: 30px; padding: 0 8px;
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s;
}
input[type="number"]:focus { border-color: var(--text); }
select {
  height: 30px; padding: 0 6px; font-size: 12px; font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); outline: none; cursor: pointer;
}
.days-wrap { display: flex; gap: 4px; flex-wrap: wrap; }
.day-btn {
  height: 26px; min-width: 34px; padding: 0 6px;
  font-size: 11px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: white; color: var(--text); cursor: pointer; transition: all 0.1s;
}
.day-btn:hover { border-color: var(--text); }
.day-btn.active { background: var(--text); border-color: var(--text); color: white; }

/* EXPAND ROW */
tr.exp-row td { background: #fafaf8; border-bottom: 0.5px solid var(--border); }
.exp-inner { padding: 8px 12px 10px 14px; border-top: 0.5px dashed var(--border); }
.exp-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
input[type="text"] {
  width: 340px; height: 28px; padding: 0 10px;
  font-size: 12px; font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s;
}
input[type="text"]:focus { border-color: var(--text); }

/* CHECK BOX */
.check-box {
  width: 20px; height: 20px;
  border: 1.5px solid var(--border-strong); border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; background: white; transition: all 0.12s; flex-shrink: 0;
}
.check-box.checked { background: var(--text); border-color: var(--text); }
.check-icon { display: none; width: 11px; height: 11px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.check-box.checked .check-icon { display: block; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-radius: var(--radius);
  width: calc(100% - 32px); max-width: 680px; max-height: 88vh;
  display: flex; flex-direction: column;
  transform: translateY(16px); transition: transform 0.25s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; border-bottom: 0.5px solid var(--border); flex-shrink: 0;
}
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-close {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: var(--radius-sm);
  border: 0.5px solid var(--border); background: transparent;
  cursor: pointer; font-size: 15px; color: var(--text-muted); transition: background 0.1s;
}
.modal-close:hover { background: var(--gray-bg); }
.modal-body { overflow-y: auto; padding: 16px 20px; flex: 1; }
.modal-footer {
  padding: 12px 20px; border-top: 0.5px solid var(--border); flex-shrink: 0;
  display: flex; gap: 8px; justify-content: space-between; align-items: center;
}
.modal-empty { text-align: center; padding: 36px 20px; color: var(--text-muted); font-size: 13px; line-height: 1.7; }

/* SUMMARY NEW STYLES */
.summ-header-info {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px; color: var(--text-muted);
  padding-bottom: 12px; margin-bottom: 4px;
  border-bottom: 0.5px solid var(--border);
}
.summ-copy-row {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 10px 0 14px; margin-bottom: 4px;
  border-bottom: 0.5px solid var(--border);
}
.summ-day-block { margin-bottom: 16px; }
.summ-day-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--green-text); background: var(--green-bg);
  border-radius: var(--radius-sm); padding: 4px 10px;
  display: inline-block; margin-bottom: 6px;
}
.summ-item {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  background: var(--gray-bg); margin-bottom: 3px;
}
.summ-item-left { display: flex; align-items: flex-start; gap: 8px; flex: 1; min-width: 0; }
.summ-cat-tag { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.summ-item-name { font-size: 13px; font-weight: 500; color: var(--text); }
.summ-item-obs { font-size: 11px; color: var(--text-light); font-style: italic; margin-top: 2px; }
.summ-item-qty {
  font-size: 12px; font-weight: 600; flex-shrink: 0;
  background: var(--green-bg); color: var(--green-text);
  border-radius: 20px; padding: 2px 10px; white-space: nowrap; margin-top: 1px;
}
.summ-item-qty.no-qty { background: var(--gray-bg); color: var(--text-light); font-weight: 400; border: 0.5px dashed var(--border-strong); }

.modal-cat-block { margin-bottom: 20px; }
.modal-cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.modal-cat-title { font-size: 13px; font-weight: 600; }
.modal-cat-sub { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: 5px; }

.modal-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px; border-radius: var(--radius-sm);
  background: var(--gray-bg); margin-bottom: 3px;
}
.modal-item-name { font-size: 12px; color: var(--text); flex: 1; }
.modal-item-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.modal-item-days { font-size: 11px; color: var(--text-muted); }
.modal-item-qty {
  font-size: 11px; font-weight: 600;
  background: var(--green-bg); color: var(--green-text);
  border-radius: 20px; padding: 2px 8px;
}
.modal-item-obs { font-size: 11px; color: var(--text-light); font-style: italic; margin-top: 3px; }

.btn-copy {
  display: inline-flex; align-items: center; gap: 5px;
  height: 28px; padding: 0 12px;
  font-size: 11px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: white; color: var(--text-muted); cursor: pointer; transition: all 0.12s;
}
.btn-copy:hover { border-color: var(--text); color: var(--text); }
.btn-copy.copied { background: var(--green-bg); border-color: var(--green-text); color: var(--green-text); }

.modal-btn {
  height: 32px; padding: 0 16px;
  font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text); cursor: pointer; transition: background 0.1s;
}
.modal-btn:hover { background: #e8e6e0; }
.modal-btn.primary { background: var(--text); color: white; border-color: var(--text); }
.modal-btn.primary:hover { background: #333; }
.modal-btn.primary.copied { background: var(--green-vivid); border-color: var(--green-vivid); }


.btn-top {
  position: fixed; bottom: 60px; right: 16px;
  width: 38px; height: 38px;
  background: var(--text); border: none;
  border-radius: 50%; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  font-size: 18px; color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  transition: background 0.1s, opacity 0.2s; z-index: 98;
}
.btn-top.visible { display: flex; }
.btn-top:hover { background: #333; }
.btn-cart {
  position: fixed; bottom: 106px; right: 16px;
  width: 38px; height: 38px;
  background: var(--text); border: none;
  border-radius: 50%; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  font-size: 17px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  transition: background 0.1s; z-index: 98;
}
.btn-cart.visible { display: flex; }
.btn-cart:hover { background: #333; }

/* TOAST */
.toast {
  position: fixed; bottom: 58px; right: 20px;
  background: var(--text); color: white; border-radius: var(--radius-sm);
  padding: 9px 16px; font-size: 12px;
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.25s, transform 0.25s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; transform: translateY(0); }

.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
.form-input {
  width: 100%; height: 36px; padding: 0 10px;
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--text); }
.form-select {
  width: 100%; height: 36px; padding: 0 10px;
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); outline: none; cursor: pointer;
}
.form-error { font-size: 11px; color: #a32d2d; margin-top: 4px; display: none; }
.form-error.visible { display: block; }
.custom-list-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 10px; border-radius: var(--radius-sm);
  background: var(--gray-bg); margin-bottom: 4px;
}
.custom-list-item-info { flex: 1; min-width: 0; }
.custom-list-item-name { font-size: 13px; font-weight: 500; color: var(--text); }
.custom-list-item-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.btn-delete {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; flex-shrink: 0;
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: white; color: var(--text-muted); cursor: pointer;
  font-size: 13px; transition: all 0.12s; margin-left: 8px;
}
.btn-delete:hover { background: #fcebeb; border-color: #a32d2d; color: #a32d2d; }
.cad-empty { text-align: center; padding: 28px 0; color: var(--text-muted); font-size: 13px; }
.list-cat-block { margin-bottom: 14px; }
.list-cat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; padding: 4px 0; margin-bottom: 4px; }
.list-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
.btn-edit {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border: 0.5px solid var(--border-strong);
  border-radius: var(--radius-sm); background: white; cursor: pointer; font-size: 13px;
  transition: all 0.12s;
}
.btn-edit:hover { background: var(--gray-bg); }
.edit-inline { padding: 10px 12px; background: var(--gray-bg); border-radius: var(--radius-sm); margin-bottom: 4px; }
.search-wrap {
  position: relative; margin-bottom: 1.25rem;
}
.search-input {
  width: 100%; height: 36px; padding: 0 36px 0 12px;
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--text); }
.search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; display: none; align-items: center; justify-content: center;
  background: var(--border-strong); color: white; border: none;
  border-radius: 50%; cursor: pointer; font-size: 11px; line-height: 1;
}
.search-clear.visible { display: flex; }
.search-clear:hover { background: var(--text); }
  margin-top: 1rem; font-size: 11px; color: var(--text-light);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; padding: 0 2px;
}

@media (max-width: 640px) {
  td.td-qty { width: auto; }
  .stats-row { gap: 8px; }
  .stat-card .num { font-size: 20px; }
}
</style>
</head>
<body>

<!-- MODAL RESUMO -->
<div class="modal-overlay" id="modal-overlay" onclick="closeSummaryOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>Resumo da semana</h3>
      <button class="modal-close" onclick="closeSummary()">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="modal-btn primary" id="btn-copy-all" onclick="copyAll()">Copiar lista completa</button>
      <button class="modal-btn" onclick="closeSummary()">Fechar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="container">
  <div class="page-header">
    <div>
      <h1>Planejamento de Compras</h1>
      <div style="display:flex;gap:6px;margin-top:8px;">
        <a href="estoque-marmitas.html" style="display:inline-flex;align-items:center;height:26px;padding:0 12px;font-size:12px;font-weight:500;background:#fff;border:0.5px solid rgba(0,0,0,0.18);border-radius:6px;color:var(--text-muted);text-decoration:none;" onmouseover="this.style.background='#f1efe8'" onmouseout="this.style.background='#fff'">Estoque</a>
        <span style="display:inline-flex;align-items:center;height:26px;padding:0 12px;font-size:12px;font-weight:600;background:var(--text);color:#fff;border-radius:6px;">Compras</span>
      </div>
    </div>
    <div class="header-right">
      <div class="header-actions">
        <div class="status-dot"><div class="dot" id="status-dot"></div><span id="status-label">Conectando...</span></div>
        <button class="btn-resumo" onclick="openSummary()">
          Resumo &nbsp;<span id="header-count" style="background:rgba(255,255,255,0.18);border-radius:20px;padding:1px 7px;font-size:12px;font-weight:600;">0</span>
        </button>
        <button class="icon-btn" onclick="openCadastro()" title="Cadastrar item">&#xff0b;</button>
        <button class="icon-btn" onclick="clearAll()" title="Limpar tudo">&#x1F5D1;</button>
      </div>
      <span class="week-label" id="week-label"></span>
    </div>
  </div>



  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="Buscar produto...">
    <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Limpar busca">&#x2715;</button>
  </div>

  <div id="cats-container"></div>

  <div class="footer-bar">
    <span>Selecione os itens, informe quantidade e dias de entrega.</span>
    <span id="footer-date"></span>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

function sid(s) { return s.replace(/[^a-z0-9]/gi,'_'); }

function setStatus(status) {
  const dot = document.getElementById('status-dot');
  const lbl = document.getElementById('status-label');
  if (!dot || !lbl) return;
  if (status === 'online') { dot.className = 'dot online'; lbl.textContent = 'Sincronizado'; }
  else if (status === 'syncing') { dot.className = 'dot syncing'; lbl.textContent = 'Salvando...'; }
  else if (status === 'offline') { dot.className = 'dot'; lbl.textContent = 'Sem conexão'; }
  else { dot.className = 'dot'; lbl.textContent = 'Conectando...'; }
}

let saveTimers = {};
function saveItem(id) {
  setStatus('syncing');
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(() => {
    const safeKey = id.replace(/[.#$\/\[\]]/g, '_');
    comprasRef.child(safeKey).set(state[id]).then(() => setStatus('online'));
  }, 600);
}

(function initLabels() {
  const now = new Date(), day = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate() - (day===0?6:day-1));
  const sat = new Date(mon); sat.setDate(mon.getDate()+5);
  const fmt = d => d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  document.getElementById('week-label').textContent = 'Semana ' + fmt(mon) + ' – ' + fmt(sat);
  document.getElementById('footer-date').textContent = now.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
})();

function updateStats() {
  const vals = Object.entries(state);
  const totalSel = vals.filter(([,s])=>s.selected).length;
  document.getElementById('header-count').textContent = totalSel;

  const catsActive = DATA.filter(c => c.items.some(item=>state[c.cat+'::'+item.name].selected)).length;
  document.getElementById('stat-cats').textContent = catsActive;

  const allDays = new Set();
  vals.forEach(([,s])=>{ if(s.selected) Object.keys(s.daysQty).forEach(d=>allDays.add(d)); });
  document.getElementById('stat-days').textContent = allDays.size;

  DATA.forEach(c => {
    const sel = c.items.filter(item=>state[c.cat+'::'+item.name].selected).length;
    const el = document.getElementById('badge-'+sid(c.cat));
    if (el) { el.textContent = sel+' sel.'; el.classList.toggle('visible', sel>0); }
  });
}

function updateChip(id) {
  const s = state[id], chip = document.getElementById('chip-'+sid(id));
  if (!chip) return;
  const days = Object.keys(s.daysQty);
  if (days.length) {
    chip.textContent = days.map(d => { const dq = s.daysQty[d]; return d + (dq.qty ? ' '+dq.qty+dq.unit : ''); }).join(' · ');
    chip.style.display = 'inline-block';
  } else chip.style.display = 'none';
}

function toggleItem(id) {
  state[id].selected = !state[id].selected;
  const cb = document.getElementById('cb-'+sid(id));
  const exp = document.getElementById('exp-'+sid(id));
  if (state[id].selected) {
    cb.classList.add('checked'); exp.style.display = 'table-row';
  } else {
    cb.classList.remove('checked'); exp.style.display = 'none';
  }
  updateChip(id); updateStats(); saveItem(id);
}

function toggleDay(id, day, btn) {
  const s = state[id];
  if (s.daysQty[day]) {
    delete s.daysQty[day];
    btn.classList.remove('active');
    // Remove qty input next to button
    const qwrap = document.getElementById('dqw-'+sid(id)+'-'+day.replace('ª','a').replace('á','a'));
    if (qwrap) qwrap.remove();
  } else {
    s.daysQty[day] = { qty: '', unit: s.defaultUnit };
    btn.classList.add('active');
    // Insert qty input next to button
    insertDayQtyInput(id, day, btn);
  }
  s.selected = Object.keys(s.daysQty).length > 0;
  const exp = document.getElementById('exp-'+sid(id));
  if (exp) exp.style.display = s.selected ? 'table-row' : 'none';
  updateChip(id); updateStats(); saveItem(id);
}

function dayKey(day) { return day.replace('ª','a').replace('á','a').replace('º','o'); }

function makeDayQtyWrap(id, day, dq) {
  const dk = dayKey(day);
  const wrap = document.createElement('span');
  wrap.id = 'dqw-'+sid(id)+'-'+dk;
  wrap.className = 'day-qty-wrap';
  const inp = document.createElement('input');
  inp.type = 'number'; inp.className = 'day-qty-input';
  inp.min = '0'; inp.step = '0.1'; inp.placeholder = '0';
  inp.value = dq.qty || '';
  inp.addEventListener('click', e => e.stopPropagation());
  inp.addEventListener('input', () => {
    state[id].daysQty[day].qty = inp.value;
    updateChip(id); saveItem(id);
  });
  const sel = document.createElement('select');
  sel.className = 'day-qty-unit';
  sel.addEventListener('click', e => e.stopPropagation());
  sel.addEventListener('change', () => {
    state[id].daysQty[day].unit = sel.value;
    updateChip(id); saveItem(id);
  });
  ['kg','g','L','ml','un','cx','pct','mç'].forEach(u => {
    const opt = document.createElement('option');
    opt.value = u; opt.textContent = u;
    if (dq.unit === u) opt.selected = true;
    sel.appendChild(opt);
  });
  wrap.appendChild(inp); wrap.appendChild(sel);
  return wrap;
}

function insertDayQtyInput(id, day, btn) {
  const dk = dayKey(day);
  const wrapId = 'dqw-'+sid(id)+'-'+dk;
  if (document.getElementById(wrapId)) return;
  const dq = state[id].daysQty[day] || { qty: '', unit: state[id].defaultUnit };
  btn.insertAdjacentElement('afterend', makeDayQtyWrap(id, day, dq));
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), 2400);
}

function clearAll() {
  if (!confirm('Limpar todos os itens selecionados?')) return;
  DATA.forEach(c => c.items.forEach(item => {
    const id = c.cat+'::'+item.name;
    state[id] = { selected: false, daysQty: {}, obs: '', defaultUnit: item.unit || 'kg' };
  }));
  comprasRef.set(null).then(() => setStatus('online'));
  renderAll();
}

function buildText(catName, items) {
  const date = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
  let t = 'PEDIDO — '+catName.toUpperCase()+'\n'+date+'\n'+'-'.repeat(34)+'\n';
  items.forEach(i => {
    t += '• '+i.name;
    if (i.qty) t += ' — '+i.qty+' '+i.unit;

    if (i.obs) t += '\n  obs: '+i.obs;
    t += '\n';
  });
  return t;
}

function copyCat(catName, btnEl) {
  const cat = DATA.find(c=>c.cat===catName);
  const sel = cat.items.filter(item=>state[cat.cat+'::'+item.name].selected)
    .map(item=>({...item,...state[cat.cat+'::'+item.name]}));
  if (!sel.length) { showToast('Nenhum item em '+catName); return; }
  navigator.clipboard.writeText(buildText(catName, sel)).then(()=>{
    btnEl.classList.add('copied'); btnEl.querySelector('span').textContent='Copiado!';
    showToast('Lista de '+catName+' copiada!');
    setTimeout(()=>{ btnEl.classList.remove('copied'); btnEl.querySelector('span').textContent='Copiar lista'; }, 2200);
  });
}

function copyAll() {
  const sel = [];
  DATA.forEach(c => {
    const items = c.items.filter(item=>state[c.cat+'::'+item.name].selected)
      .map(item=>({...item,...state[c.cat+'::'+item.name]}));
    if (items.length) sel.push({cat:c.cat, items});
  });
  if (!sel.length) { showToast('Nenhum item selecionado'); return; }
  const date = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
  let t = 'PLANEJAMENTO DE COMPRAS\n'+date+'\n'+'='.repeat(36)+'\n\n';
  sel.forEach(s => { t += buildText(s.cat, s.items)+'\n'; });
  navigator.clipboard.writeText(t).then(()=>{
    const btn = document.getElementById('btn-copy-all');
    btn.classList.add('copied'); btn.textContent='Copiado!';
    showToast('Lista completa copiada!');
    setTimeout(()=>{ btn.classList.remove('copied'); btn.textContent='Copiar lista completa'; }, 2200);
  });
}

function getItemsByDay() {
  // Returns { '2ª': [{cat, emoji, name, supplier, qty, unit, obs}], ... }
  const byDay = {};
  DAYS.forEach(d => byDay[d] = []);
  const noDay = [];
  DATA.forEach(cat => {
    cat.items.forEach(item => {
      const id = cat.cat+'::'+item.name;
      const s = state[id];
      if (!s.selected) return;
      const days = Object.keys(s.daysQty);
      if (days.length === 0) {
        noDay.push({cat: cat.cat, emoji: cat.emoji, name: item.name, supplier: item.supplier, qty: '', unit: s.defaultUnit, obs: s.obs});
      } else {
        days.forEach(d => {
          if (byDay[d]) byDay[d].push({cat: cat.cat, emoji: cat.emoji, name: item.name, supplier: item.supplier, qty: s.daysQty[d].qty, unit: s.daysQty[d].unit, obs: s.obs});
        });
      }
    });
  });
  return {byDay, noDay};
}

function buildDayCatText(day, catName, items) {
  const date = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
  const dayFull = {'2ª':'Segunda','3ª':'Terça','4ª':'Quarta','5ª':'Quinta','6ª':'Sexta','Sáb':'Sábado'}[day] || day;
  let t = 'PEDIDO — '+catName.toUpperCase()+' ('+dayFull+')\n'+date+'\n'+'-'.repeat(34)+'\n';
  items.forEach(i => {
    t += '• '+i.name;
    if (i.qty) t += ' — '+i.qty+' '+i.unit;
    if (i.obs) t += '\n  obs: '+i.obs;
    t += '\n';
  });
  return t;
}

function copyDayCat(day, catName, btnEl) {
  const {byDay} = getItemsByDay();
  const items = (byDay[day]||[]).filter(i => i.cat === catName);
  if (!items.length) { showToast('Nenhum item'); return; }
  navigator.clipboard.writeText(buildDayCatText(day, catName, items)).then(() => {
    btnEl.classList.add('copied'); btnEl.querySelector('span').textContent = 'Copiado!';
    showToast('Copiado!');
    setTimeout(() => { btnEl.classList.remove('copied'); btnEl.querySelector('span').textContent = 'Copiar'; }, 2000);
  });
}

function renderSummaryBody(body, showCopyBtns) {
  const {byDay, noDay} = getItemsByDay();
  const allItems = Object.values(byDay).flat().concat(noDay);
  if (!allItems.length) {
    body.innerHTML = '<div class="modal-empty">Nenhum item selecionado ainda.<br>Selecione os dias na lista para ver o resumo aqui.</div>';
    return;
  }
  const DAY_LABELS = {'2ª':'2ª feira','3ª':'3ª feira','4ª':'4ª feira','5ª':'5ª feira','6ª':'6ª feira','Sáb':'Sábado'};
  const activeDays = DAYS.filter(d => byDay[d] && byDay[d].length > 0);

  const diasHtml = activeDays.map(dia => {
    const itensDia = byDay[dia];
    // Group by category
    const cats = [...new Set(itensDia.map(i => i.cat))];
    return `<div class="summ-day-block">
      <div class="summ-day-title">${DAY_LABELS[dia]}</div>
      ${cats.map(catName => {
        const catItems = itensDia.filter(i => i.cat === catName);
        const catEmoji = catItems[0].emoji || '';
        return `<div class="summ-cat-group">
          <div class="summ-cat-group-header">
            <span class="summ-cat-group-name">${catEmoji} ${catName}</span>
            ${showCopyBtns ? `<button class="btn-copy" onclick="copyDayCat('${dia}','${catName.replace(/'/g,"\'")}',this)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              <span>Copiar</span>
            </button>` : ''}
          </div>
          ${catItems.map(item => `
            <div class="summ-item">
              <div class="summ-item-left">
                <div>
                  <div class="summ-item-name">${item.name}</div>
                  ${item.obs ? `<div class="summ-item-obs">${item.obs}</div>` : ''}
                </div>
              </div>
              <span class="summ-item-qty${item.qty ? '' : ' no-qty'}">${item.qty ? item.qty+' '+item.unit : 'sem qtd'}</span>
            </div>`).join('')}
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  const semDiaHtml = noDay.length ? `
    <div class="summ-day-block">
      <div class="summ-day-title" style="color:var(--amber-text);background:var(--amber-bg);">Sem dia definido</div>
      ${noDay.map(item => `
        <div class="summ-item">
          <div class="summ-item-left"><div>
            <div class="summ-item-name">${item.emoji || ''} ${item.name}</div>
            ${item.obs ? `<div class="summ-item-obs">${item.obs}</div>` : ''}
          </div></div>
          <span class="summ-item-qty no-qty">sem qtd</span>
        </div>`).join('')}
    </div>` : '';

  const totalItems = [...new Set(allItems.map(i=>i.cat+'::'+i.name))].length;
  body.innerHTML = `
    <div class="summ-header-info">
      <span>${totalItems} ${totalItems===1?'item':'itens'} selecionados</span>
      <span>${activeDays.length} ${activeDays.length===1?'dia':'dias'} com entregas</span>
    </div>
    ${diasHtml}${semDiaHtml}`;
}

      DAYS.forEach(d => {
        const btn = document.createElement('button');
        const active = !!s.daysQty[d];
        btn.className = 'day-btn'+(active?' active':'');
        btn.textContent = d;
        btn.dataset.day = d;
        btn.dataset.itemId = id;
        btn.onclick = e => { e.stopPropagation(); toggleDay(id, d, btn); };
        dw.appendChild(btn);
        if (active) {
          dw.appendChild(makeDayQtyWrap(id, d, s.daysQty[d]));
        }
      });
      tdName.innerHTML = `<div class="item-name">${item.name}</div>
        ${item.supplier?`<div class="item-supplier">${item.supplier}</div>`:''}
        <span class="item-chip" id="chip-${sid(id)}"></span>`;
      tdName.appendChild(dw);
      tr.appendChild(tdName);

      // expand row
      const expTr = document.createElement('tr');
      expTr.className = 'exp-row'; expTr.id = 'exp-'+sid(id);
      expTr.style.display = s.selected ? 'table-row' : 'none';
      const expTd = document.createElement('td'); expTd.colSpan = 1;
      const expInner = document.createElement('div'); expInner.className = 'exp-inner';
      const expLabel = document.createElement('div'); expLabel.className = 'exp-label'; expLabel.textContent = 'Observação';
      const obsInp = document.createElement('input'); obsInp.type = 'text';
      obsInp.placeholder = 'ex: cortar em cubos, fatiar fino...';
      obsInp.value = s.obs || '';
      obsInp.addEventListener('click', e => e.stopPropagation());
      obsInp.addEventListener('input', () => { state[id].obs = obsInp.value; saveItem(id); });
      expInner.appendChild(expLabel); expInner.appendChild(obsInp);
      expTd.appendChild(expInner);
      expTr.appendChild(expTd);

      tbody.appendChild(tr); tbody.appendChild(expTr);
    });

    table.appendChild(thead); table.appendChild(tbody);
    tw.appendChild(table);
    block.appendChild(hdr); block.appendChild(tw);
    container.appendChild(block);
  });
  updateStats();
}

// ── CUSTOM ITEMS ──
const customItemsRef = db.ref('custom_items');
let customItems = [];
let customLoaded = false, comprasLoaded = false;

function maybeRender() {
  if (customLoaded && comprasLoaded) { renderAll(); setStatus('online'); }
}

customItemsRef.once('value', snap => {
  customItems = snap.val() ? Object.values(snap.val()) : [];
  customItems.forEach(item => addCustomItemToData(item));
  customLoaded = true;
  maybeRender();
});

function addCustomItemToData(item) {
  const cat = DATA.find(c => c.cat === item.cat);
  if (!cat) return;
  const exists = cat.items.some(i => i.name === item.name);
  if (!exists) {
    cat.items.push({ name: item.name, supplier: item.supplier || '', unit: item.unit || 'kg', custom: true });
    const id = item.cat + '::'+ item.name;
    if (!state[id]) state[id] = { selected: false, daysQty: {}, obs: '', defaultUnit: item.unit || 'kg' };
  }
}

function switchTab(tab) {
  const isNovo = tab === 'novo';
  document.getElementById('cad-tab-novo').style.display = isNovo ? '' : 'none';
  document.getElementById('cad-tab-lista').style.display = isNovo ? 'none' : '';
  document.getElementById('cad-footer').style.display = isNovo ? '' : 'none';
  const btnNovo = document.getElementById('tab-novo');
  const btnLista = document.getElementById('tab-lista');
  btnNovo.style.background = isNovo ? 'var(--text)' : 'white';
  btnNovo.style.color = isNovo ? 'white' : 'var(--text-muted)';
  btnLista.style.background = isNovo ? 'white' : 'var(--text)';
  btnLista.style.color = isNovo ? 'var(--text-muted)' : 'white';
  if (!isNovo) renderAllItemsList();
}

function renderAllItemsList() {
  const container = document.getElementById('cad-lista-items');
  const searchEl = document.getElementById('list-search');
  const q = searchEl ? searchEl.value.toLowerCase() : '';

  const allItems = [];
  DATA.forEach(cat => cat.items.forEach(item => {
    allItems.push({name: item.name, supplier: item.supplier||'', unit: item.unit||'kg', cat: cat.cat, emoji: cat.emoji, custom: !!item.custom});
  }));
  const filtered = q ? allItems.filter(i =>
    i.name.toLowerCase().includes(q) || i.supplier.toLowerCase().includes(q) || i.cat.toLowerCase().includes(q)
  ) : allItems;

  let html = '<div class="search-wrap" style="margin-bottom:12px"><input class="search-input" id="list-search" type="text" placeholder="Filtrar produtos..."' +
    ' value="" oninput="renderAllItemsList()"><button class="search-clear" id="list-clear-btn" onclick="clearListSearch()">&#x2715;</button></div>';

  if (!filtered.length) {
    container.innerHTML = html + '<div class="cad-empty">Nenhum item encontrado.</div>';
    if (q) { const el = container.querySelector('#list-search'); if(el) { el.value = q; el.querySelector && true; container.querySelector('#list-clear-btn').classList.add('visible'); } }
    return;
  }

  const byCat = {};
  DATA.forEach(cat => { byCat[cat.cat] = []; });
  filtered.forEach(i => { if (byCat[i.cat]) byCat[i.cat].push(i); });

  DATA.filter(cd => byCat[cd.cat] && byCat[cd.cat].length).forEach(cd => {
    html += '<div class="list-cat-block"><div class="list-cat-label">' + (cd.emoji||'') + ' ' + cd.cat + '</div>';
    byCat[cd.cat].forEach(item => {
      const key = cd.cat + '::' + item.name;
      const sk = sid(key);
      html += '<div class="custom-list-item" id="row-' + sk + '">';
      html += '<div class="custom-list-item-info" id="eview-' + sk + '">';
      html += '<div class="custom-list-item-name">' + item.name + '</div>';
      html += '<div class="custom-list-item-meta">' + (item.supplier ? item.supplier + ' · ' : '') + item.unit + '</div>';
      html += '</div>';
      html += '<div class="list-item-actions" id="eact-' + sk + '">';
      html += '<button class="btn-edit" data-key="' + sk + '" onclick="openEditItem(this.dataset.key)">✏️</button>';
      html += '<button class="btn-delete" data-key="' + sk + '" data-nome="' + item.name.replace(/"/g,'&quot;') + '" data-custom="' + (item.custom ? '1' : '0') + '" onclick="deletarItemFromList(this.dataset.key,this.dataset.nome,+this.dataset.custom)">&#x1F5D1;</button>';
      html += '</div></div>';
      html += '<div class="edit-inline" id="eform-' + sk + '" style="display:none">';
      html += '<input class="form-input" id="enome-' + sk + '" type="text" value="' + item.name.replace(/"/g,'&quot;') + '" placeholder="Nome" style="margin-bottom:6px">';
      html += '<input class="form-input" id="eforn-' + sk + '" type="text" value="' + item.supplier.replace(/"/g,'&quot;') + '" placeholder="Fornecedor" style="margin-bottom:6px">';
      html += '<div style="display:flex;gap:6px;margin-bottom:8px"><select class="form-select" id="ecat-' + sk + '" style="flex:1">';
      DATA.forEach(co => { html += '<option value="' + co.cat + '"' + (co.cat === cd.cat ? ' selected' : '') + '>' + co.cat + '</option>'; });
      html += '</select><select class="form-select" id="eunit-' + sk + '" style="width:80px">';
      ['kg','g','L','ml','un','cx','pct','mç'].forEach(u => { html += '<option' + (item.unit===u?' selected':'') + '>' + u + '</option>'; });
      html += '</select></div>';
      html += '<div style="display:flex;gap:6px">';
      html += '<button class="modal-btn primary" data-key="' + sk + '" data-custom="' + (item.custom ? '1' : '0') + '" style="height:28px;font-size:12px;padding:0 14px" onclick="salvarEdicao(this.dataset.key,+this.dataset.custom)">Salvar</button>';
      html += '<button class="modal-btn" data-key="' + sk + '" style="height:28px;font-size:12px;padding:0 12px" onclick="cancelarEdicao(this.dataset.key)">Cancelar</button>';
      html += '</div></div>';
    });
    html += '</div>';
  });

  container.innerHTML = html;
  if (q) {
    const inp = container.querySelector('#list-search');
    if (inp) { inp.value = q; }
    const clr = container.querySelector('#list-clear-btn');
    if (clr) clr.classList.add('visible');
  }
}

function keyFromSid(sk) {
  // Find the item in DATA whose sid(cat::name) === sk
  for (const cat of DATA) {
    for (const item of cat.items) {
      const key = cat.cat + '::' + item.name;
      if (sid(key) === sk) return key;
    }
  }
  return null;
}

function openEditItem(sk) {
  const key = keyFromSid(sk) || sk;
  const sk2 = sid(key);
  const view = document.getElementById('eview-'+sk2); if (view) view.style.display = 'none';
  const act = document.getElementById('eact-'+sk2); if (act) act.style.display = 'none';
  const form = document.getElementById('eform-'+sk2); if (form) form.style.display = '';
}

function cancelarEdicao(sk) {
  const view = document.getElementById('eview-'+sk); if (view) view.style.display = '';
  const act = document.getElementById('eact-'+sk); if (act) act.style.display = '';
  const form = document.getElementById('eform-'+sk); if (form) form.style.display = 'none';
}

function salvarEdicao(sk, wasCustom) {
  const oldKey = keyFromSid(sk) || sk;
  const newNome = document.getElementById('enome-'+sk).value.trim();
  const newForn = document.getElementById('eforn-'+sk).value.trim();
  const newCat  = document.getElementById('ecat-'+sk).value;
  const newUnit = document.getElementById('eunit-'+sk).value;
  if (!newNome) { showToast('Preencha o nome'); return; }
  const [oldCat, oldNome] = oldKey.split('::');
  const newKey = newCat+'::'+newNome;
  const oldSafeKey = oldKey.replace(/[.#$\/\[\]]/g, '_');
  const newSafeKey = newKey.replace(/[.#$\/\[\]]/g, '_');
  // Update DATA
  const oldCatData = DATA.find(c => c.cat === oldCat);
  if (oldCatData) oldCatData.items = oldCatData.items.filter(i => i.name !== oldNome);
  const newCatData = DATA.find(c => c.cat === newCat);
  if (newCatData) newCatData.items.push({ name: newNome, supplier: newForn, unit: newUnit, custom: true });
  // Update state
  const oldState = state[oldKey] || { selected: false, daysQty: {}, obs: '', defaultUnit: newUnit };
  delete state[oldKey];
  state[newKey] = { ...oldState, defaultUnit: newUnit };
  // Update customItems
  customItems = customItems.filter(i => !(i.cat === oldCat && i.name === oldNome));
  customItems.push({ name: newNome, supplier: newForn, cat: newCat, unit: newUnit, custom: true });
  // Firebase
  if (wasCustom) customItemsRef.child(oldSafeKey).remove();
  customItemsRef.child(newSafeKey).set({ name: newNome, supplier: newForn, cat: newCat, unit: newUnit, custom: true }).then(() => setStatus('online'));
  renderAll(); renderAllItemsList(); showToast('Item atualizado!');
}

function deletarItemFromList(sk, nome, isCustom) {
  isCustom = !!isCustom;
  if (!confirm('Deletar "' + nome + '"?')) return;
  const key = keyFromSid(sk) || sk;
  const safeKey = key.replace(/[.#$\/\[\]]/g, '_');
  DATA.forEach(cat => { cat.items = cat.items.filter(i => (cat.cat+'::'+i.name) !== key); });
  delete state[key];
  if (isCustom) {
    customItems = customItems.filter(i => (i.cat+'::'+i.name) !== key);
    customItemsRef.child(safeKey).remove().then(() => setStatus('online'));
  }
  renderAllItemsList(); renderAll(); showToast('"'+nome+'" removido.');
}
function openCadastro() {
  document.getElementById('cad-nome').value = '';
  document.getElementById('cad-fornecedor').value = '';
  document.getElementById('cad-cat').value = '';
  document.getElementById('cad-unit').value = 'kg';
  document.getElementById('cad-nome-err').classList.remove('visible');
  document.getElementById('cad-cat-err').classList.remove('visible');
  switchTab('novo');
  document.getElementById('cadastro-overlay').classList.add('open');
  setTimeout(() => document.getElementById('cad-nome').focus(), 100);
}

function closeCadastro() {
  document.getElementById('cadastro-overlay').classList.remove('open');
}

function salvarItem() {
  const nome = document.getElementById('cad-nome').value.trim();
  const cat = document.getElementById('cad-cat').value;
  const fornecedor = document.getElementById('cad-fornecedor').value.trim();
  const unit = document.getElementById('cad-unit').value;
  let valid = true;
  if (!nome) { document.getElementById('cad-nome-err').classList.add('visible'); valid = false; }
  else document.getElementById('cad-nome-err').classList.remove('visible');
  if (!cat) { document.getElementById('cad-cat-err').classList.add('visible'); valid = false; }
  else document.getElementById('cad-cat-err').classList.remove('visible');
  if (!valid) return;
  const item = { name: nome, supplier: fornecedor, cat, unit, custom: true };
  const safeKey = (cat + '::'+ nome).replace(/[.#$\/\[\]]/g, '_');
  addCustomItemToData(item);
  closeCadastro();
  showToast('Item "' + nome + '" cadastrado!');
  renderAll();
  customItemsRef.child(safeKey).set(item).then(() => setStatus('online'));
}

// ── SEARCH ──
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible', q.length > 0);
  DATA.forEach(cat => {
    const tw = document.getElementById('tw-'+sid(cat.cat));
    const chev = document.getElementById('chev-'+sid(cat.cat));
    const block = tw && tw.parentElement;
    if (!tw) return;
    let anyVisible = false;
    cat.items.forEach(item => {
      const id = cat.cat+'::'+item.name;
      const row = document.getElementById('tr-'+sid(id));
      const expRow = document.getElementById('exp-'+sid(id));
      if (!row) return;
      const match = !q || item.name.toLowerCase().includes(q) || (item.supplier||'').toLowerCase().includes(q);
      row.style.display = match ? '' : 'none';
      if (expRow) expRow.style.display = (match && state[id].selected) ? 'table-row' : 'none';
      if (match) anyVisible = true;
    });
    if (block) block.style.display = anyVisible ? '' : 'none';
    if (q && anyVisible) { tw.style.display = 'block'; if (chev) chev.classList.add('open'); }
    else if (!q) { tw.style.display = 'none'; if (chev) chev.classList.remove('open'); }
  });
});

function clearListSearch() {
  const inp = document.getElementById('list-search');
  if (inp) { inp.value = ''; renderAllItemsList(); inp.focus(); }
}

function clearSearch() {
  const inp = document.getElementById('search-input');
  inp.value = ''; inp.dispatchEvent(new Event('input')); inp.focus();
}

// Carrega do Firebase e renderiza
// Fallback: renderiza mesmo se Firebase demorar
const fallbackTimer = setTimeout(() => {
  if (!document.querySelector('.category-block')) {
    customLoaded = true; comprasLoaded = true;
    renderAll();
    setStatus('offline');
  }
}, 3000);

comprasRef.once('value', snap => {
  clearTimeout(fallbackTimer);
  const data = snap.val() || {};
  DATA.forEach(c => c.items.forEach(item => {
    const id = c.cat + '::' + item.name;
    const safeKey = id.replace(/[.#$\/\[\]]/g, '_');
    if (data[safeKey]) {
      const saved = data[safeKey];
      state[id] = { selected: false, daysQty: {}, obs: '', defaultUnit: item.unit || 'kg' };
      if (saved.daysQty) state[id].daysQty = saved.daysQty;
      if (saved.obs) state[id].obs = saved.obs;
      state[id].selected = saved.selected || Object.keys(state[id].daysQty).length > 0;
    }
  }));
  comprasLoaded = true;
  maybeRender();

  // Escuta mudanças de outros dispositivos em tempo real
  comprasRef.on('child_changed', snap => {
    const safeKey = snap.key;
    const val = snap.val();
    const id = Object.keys(state).find(k => k.replace(/[.#$\/\[\]]/g, '_') === safeKey);
    if (!id || !val) return;
    const defUnit = DATA.flatMap(c=>c.items).find(i=> c.cat+'::'+i.name === id)?.unit || 'kg';
    state[id] = { selected: false, daysQty: {}, obs: '', defaultUnit: defUnit };
    if (val.daysQty) state[id].daysQty = val.daysQty;
    if (val.obs) state[id].obs = val.obs;
    state[id].selected = val.selected || Object.keys(state[id].daysQty).length > 0;
    // Atualiza UI sem re-renderizar tudo
    const cb = document.getElementById('cb-'+sid(id));
    const exp = document.getElementById('exp-'+sid(id));
    if (cb) {
      cb.classList.toggle('checked', state[id].selected);
      if (exp) exp.style.display = state[id].selected ? 'table-row' : 'none';
    }
    updateChip(id);
    updateStats();
    setStatus('online');
  });

  comprasRef.on('child_removed', snap => {
    const safeKey = snap.key;
    const id = Object.keys(state).find(k => k.replace(/[.#$\/\[\]]/g, '_') === safeKey);
    if (!id) return;
    state[id] = { selected: false, daysQty: {}, obs: '', defaultUnit: 'kg' };
    const cb = document.getElementById('cb-'+sid(id));
    const exp = document.getElementById('exp-'+sid(id));
    if (cb) { cb.classList.remove('checked'); if(exp) exp.style.display='none'; }
    updateChip(id); updateStats();
  });
}, err => {
  clearTimeout(fallbackTimer);
  renderAll();
  setStatus('offline');
});
</script>
